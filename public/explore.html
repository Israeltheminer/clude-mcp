<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLUDE — Memory Explorer</title>
  <meta name="description" content="Visualize, search, and explore your agent's mind. Load memories from cloud or local files.">
  <meta name="privy-app-id" content="">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f5f0;
      --bg-warm: #eeeee8;
      --surface: rgba(255, 255, 255, 0.92);
      --text: #111;
      --text-muted: #666;
      --text-faint: #999;
      --border: rgba(0, 0, 0, 0.08);
      --accent: #2244ff;
      --accent-light: #5566ff;
      --episodic: #1a3abf;
      --semantic: #3a4a7a;
      --procedural: #2a6a3a;
      --selfmodel: #5a3a80;
      --mono: 'JetBrains Mono', monospace;
      --error: #9a3030;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      -webkit-font-smoothing: antialiased;
    }
    /* ── NAV ── */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 100;
      background: rgba(245, 245, 240, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 2rem;
      height: 56px; display: flex; align-items: center;
    }
    .nav-left { display: flex; align-items: center; gap: 1rem; }
    .nav-logo {
      font-size: 13px; font-weight: 800; letter-spacing: 5px;
      color: var(--text); text-transform: uppercase;
      text-decoration: none; transition: color 0.3s;
    }
    .nav-logo:hover { color: var(--accent); text-decoration: none; }
    .nav-status {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.65rem; color: var(--text-faint); letter-spacing: 1px;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #2a6a3a;
      animation: pulse-dot 3s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .nav-links {
      display: flex; align-items: center; gap: 2rem; margin-left: auto;
    }
    .nav-links a {
      color: var(--text-muted); font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; text-decoration: none; transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--text); text-decoration: none; }
    .nav-links a.nav-active { color: var(--text); font-weight: 600; }
    .nav-toggle {
      display: none; background: none; border: none; cursor: pointer;
      padding: 6px; flex-direction: column; gap: 4px;
    }
    .nav-toggle span {
      display: block; width: 18px; height: 1.5px;
      background: var(--text); transition: all 0.3s;
    }
    .nav-toggle.open span:nth-child(1) { transform: rotate(45deg) translate(3.5px, 3.5px); }
    .nav-toggle.open span:nth-child(2) { opacity: 0; }
    .nav-toggle.open span:nth-child(3) { transform: rotate(-45deg) translate(3.5px, -3.5px); }
    /* ── HERO ── */
    .hero {
      padding: 96px 40px 0;
      text-align: center;
    }
    .hero-label {
      font-size: 9px; letter-spacing: 5px; text-transform: uppercase;
      color: var(--text-faint); margin-bottom: 16px;
    }
    .hero-title {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 800; line-height: 1.1;
      letter-spacing: -1px; margin-bottom: 12px;
    }
    .hero-title em {
      font-style: normal;
      background: linear-gradient(135deg, #2244ff, #5566ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 12px; color: var(--text-muted);
      max-width: 440px; margin: 0 auto; line-height: 1.8;
    }
    /* ── API KEY TAB ── */
    .api-key-form {
      display: flex; gap: 8px; align-items: stretch;
    }
    .api-key-input {
      flex: 1; padding: 12px 16px;
      font-family: var(--mono); font-size: 11px;
      background: white; border: 1px solid var(--border);
      color: var(--text); outline: none;
      transition: border-color 0.3s;
    }
    .api-key-input:focus { border-color: var(--accent); }
    .api-key-input::placeholder { color: var(--text-faint); }
    .btn {
      font-family: var(--mono);
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      padding: 12px 24px; cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--text); color: var(--bg);
      border: 1px solid var(--text);
    }
    .btn-primary:hover {
      background: transparent; color: var(--text);
    }
    .btn-outline {
      background: transparent; color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-outline:hover {
      border-color: var(--text); color: var(--text);
    }
    .btn-danger {
      background: transparent; color: var(--error);
      border: 1px solid rgba(154, 48, 48, 0.2);
    }
    .btn-danger:hover {
      border-color: var(--error);
    }
    .connected-state {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      background: rgba(42, 106, 58, 0.06);
      border: 1px solid rgba(42, 106, 58, 0.15);
    }
    .connected-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #2a6a3a; flex-shrink: 0;
      animation: pulse-dot 3s ease-in-out infinite;
    }
    .connected-label {
      font-size: 10px; letter-spacing: 1px; color: #2a6a3a;
      flex: 1;
    }
    .error-msg {
      font-size: 10px; color: var(--error);
      margin-top: 8px; letter-spacing: 0.5px;
    }
    /* ── WALLET TAB ── */
    .wallet-info {
      font-size: 11px; color: var(--text-muted); line-height: 1.8;
      margin-top: 12px;
    }
    #privy-root {
      min-height: 44px;
      display: flex; align-items: center; justify-content: center;
    }
    .privy-fallback {
      font-size: 10px; color: var(--text-faint);
      letter-spacing: 1px; text-align: center;
      padding: 16px;
    }
    /* ── FILE DROP ZONE ── */
    .drop-zone {
      border: 1.5px dashed rgba(0,0,0,0.12);
      padding: 40px 20px; text-align: center;
      cursor: pointer; transition: all 0.3s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(34, 68, 255, 0.02);
    }
    .drop-zone-icon {
      font-size: 24px; color: var(--text-faint);
      margin-bottom: 12px; display: block;
    }
    .drop-zone-text {
      font-size: 11px; color: var(--text-muted);
      letter-spacing: 1px; margin-bottom: 4px;
    }
    .drop-zone-hint {
      font-size: 9px; color: var(--text-faint);
      letter-spacing: 1px;
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
    }
    .file-loaded {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      background: rgba(34, 68, 255, 0.04);
      border: 1px solid rgba(34, 68, 255, 0.12);
    }
    .file-loaded-name {
      font-size: 11px; color: var(--accent);
      flex: 1; letter-spacing: 0.5px;
    }
    /* ── STATS BAR ── */
    .stats-bar {
      max-width: 680px; margin: 32px auto 0; padding: 0 20px;
      display: none;
    }
    .stats-bar.visible { display: block; }
    .stats-inner {
      display: flex; align-items: center; justify-content: center; gap: 20px;
      padding: 12px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .stat {
      font-size: 10px; color: var(--text-faint); letter-spacing: 1px;
    }
    .stat .v {
      color: var(--text); font-weight: 600;
    }
    .stat-sep {
      width: 3px; height: 3px; border-radius: 50%;
      background: var(--border); flex-shrink: 0;
    }
    /* ── BRAIN IFRAME ── */
    .brain-section {
      max-width: 1200px; margin: 32px auto 0; padding: 0 20px;
    }
    .brain-frame-wrap {
      border: 1px solid var(--border);
      background: var(--bg);
      position: relative; overflow: hidden;
    }
    .brain-frame-wrap iframe {
      width: 100%; height: 60vh; border: none; display: block;
    }
    .brain-label {
      position: absolute; top: 16px; left: 20px;
      font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--text-faint); z-index: 2; pointer-events: none;
    }
    /* ── SEARCH ── */
    .search-section {
      max-width: 680px; margin: 28px auto 0; padding: 0 20px;
      display: none;
    }
    .search-section.visible { display: block; }
    .search-bar {
      display: flex; align-items: stretch; gap: 0;
      border: 1px solid var(--border);
      background: white;
      transition: border-color 0.3s;
    }
    .search-bar:focus-within { border-color: var(--accent); }
    .search-icon {
      display: flex; align-items: center; justify-content: center;
      padding: 0 14px; color: var(--text-faint);
      font-size: 14px; flex-shrink: 0;
    }
    .search-input {
      flex: 1; padding: 12px 0;
      font-family: var(--mono); font-size: 11px;
      background: transparent; border: none;
      color: var(--text); outline: none;
    }
    .search-input::placeholder { color: var(--text-faint); }
    .search-mode {
      display: flex; align-items: center; gap: 0;
      border-left: 1px solid var(--border); flex-shrink: 0;
    }
    .search-mode-btn {
      padding: 8px 14px;
      font-family: var(--mono); font-size: 9px;
      letter-spacing: 1px; text-transform: uppercase;
      background: none; border: none; cursor: pointer;
      color: var(--text-faint); transition: all 0.2s;
    }
    .search-mode-btn:hover { color: var(--text-muted); }
    .search-mode-btn.active {
      color: var(--accent); font-weight: 600;
    }
    .search-mode-btn:disabled {
      opacity: 0.3; cursor: default;
    }
    .search-count {
      font-size: 9px; color: var(--text-faint);
      letter-spacing: 1px; margin-top: 8px;
      text-align: right;
    }
    /* ── MEMORY CARDS ── */
    .cards-section {
      max-width: 800px; margin: 24px auto 60px; padding: 0 20px;
      display: none;
    }
    .cards-section.visible { display: block; }
    .cards-grid {
      position: relative;
      padding-left: 36px;
    }
    .cards-grid::before {
      content: '';
      position: absolute; left: 12px; top: 0; bottom: 0;
      width: 1px; background: var(--border);
    }
    .memory-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 14px 18px;
      cursor: pointer;
      transition: background 0.1s;
      margin-bottom: 12px;
    }
    .memory-card::before {
      content: '';
      position: absolute; left: -32px; top: 16px;
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--text-faint);
      border: 2px solid var(--bg);
    }
    .memory-card:hover { background: var(--bg-warm, #eeeee8); }
    .memory-card[data-type="episodic"]::before { background: var(--episodic); }
    .memory-card[data-type="semantic"]::before { background: var(--semantic); }
    .memory-card[data-type="procedural"]::before { background: var(--procedural); }
    .memory-card[data-type="self_model"]::before { background: var(--selfmodel); }
    .card-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px;
    }
    .card-type {
      font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
      font-weight: 700; white-space: nowrap;
    }
    .card-type[data-type="episodic"] { color: var(--episodic); }
    .card-type[data-type="semantic"] { color: var(--semantic); }
    .card-type[data-type="procedural"] { color: var(--procedural); }
    .card-type[data-type="self_model"] { color: var(--selfmodel); }
    .card-id {
      font-size: 9px; color: var(--text-faint); margin-left: auto;
    }
    .card-summary {
      font-size: 12px; line-height: 1.65; color: var(--text);
      margin-bottom: 10px;
    }
    .card-tags {
      display: flex; gap: 4px; flex-wrap: wrap;
      margin-top: 10px;
    }
    .card-tag {
      font-size: 8px; color: var(--text-faint);
      border: 1px solid var(--border);
      padding: 2px 8px; letter-spacing: 1px;
    }
    .card-actions {
      display: flex; gap: 6px; margin-top: 10px;
      border-top: 1px solid var(--border); padding-top: 10px;
    }
    .card-actions button {
      font-family: var(--mono); font-size: 8px;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 5px 12px; cursor: pointer;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-muted); transition: all 0.2s;
    }
    .card-actions button:hover { border-color: var(--accent); color: var(--accent); }
    /* ── PROVENANCE PANEL ── */
    .provenance-overlay {
      position: fixed; inset: 0; z-index: 150;
      background: rgba(245, 245, 240, 0.97);
      backdrop-filter: blur(8px);
      display: none; overflow-y: auto;
    }
    .provenance-overlay.visible { display: block; }
    .prov-container {
      max-width: 1200px; margin: 0 auto; padding: 2rem;
    }
    .prov-header {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1.5rem; padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .prov-close {
      background: none; border: 1px solid var(--border);
      font-family: var(--mono); font-size: 9px;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 8px 16px; cursor: pointer; color: var(--text-muted);
      transition: all 0.2s;
    }
    .prov-close:hover { border-color: var(--text); color: var(--text); }
    .prov-title {
      font-size: 14px; font-weight: 700; letter-spacing: -0.5px;
    }
    .prov-title em {
      font-style: normal;
      background: linear-gradient(135deg, #2244ff, #5566ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .prov-stats {
      display: flex; gap: 1.5rem; flex-wrap: wrap;
      padding: 12px 0; margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      font-size: 10px; color: var(--text-faint); letter-spacing: 0.5px;
    }
    .prov-stats .v { color: var(--text); font-weight: 600; }
    .prov-layout {
      display: grid; grid-template-columns: 1fr 380px; gap: 1.5rem;
    }
    @media (max-width: 900px) { .prov-layout { grid-template-columns: 1fr; } }
    .prov-graph {
      background: var(--surface); border: 1px solid var(--border);
      position: relative; overflow: hidden; min-height: 420px;
    }
    .prov-graph canvas { width: 100%; height: 100%; display: block; }
    .prov-graph-legend {
      position: absolute; bottom: 10px; left: 10px;
      display: flex; gap: 10px; font-size: 9px;
      background: rgba(255,255,255,0.9); padding: 5px 10px;
      letter-spacing: 0.5px;
    }
    .prov-legend-dot {
      width: 7px; height: 7px; border-radius: 50%; display: inline-block;
      margin-right: 3px; vertical-align: middle;
    }
    .prov-sidebar { display: flex; flex-direction: column; gap: 1rem; }
    .prov-section-label {
      font-size: 9px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--text-faint);
      margin-bottom: 4px;
    }
    .prov-node-card {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--text-faint); padding: 12px 14px;
      cursor: pointer; transition: all 0.2s; font-size: 10px;
    }
    .prov-node-card:hover { border-color: rgba(0,0,0,0.12); }
    .prov-node-card.prov-root { border-left-color: var(--accent); }
    .prov-node-card.prov-ancestor { border-left-color: #3498db; }
    .prov-node-card.prov-descendant { border-left-color: #2a6a3a; }
    .prov-node-card.prov-related { border-left-color: #9b59b6; }
    .prov-node-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px;
    }
    .prov-node-type {
      font-size: 8px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase;
    }
    .prov-node-date { font-size: 9px; color: var(--text-faint); }
    .prov-node-relation { font-size: 9px; color: var(--accent); margin-bottom: 4px; }
    .prov-node-summary { font-size: 10px; line-height: 1.6; color: var(--text-muted); margin-bottom: 6px; }
    .prov-node-meta {
      display: flex; gap: 10px; font-size: 9px; color: var(--text-faint);
    }
    .prov-node-meta .v { color: var(--text-muted); font-weight: 500; }
    /* ── EXPLAIN / ASK ── */
    /* ── MEMORY CHAT ── */
    .prov-chat {
      display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border);
      margin-top: 1rem; height: 320px;
    }
    .prov-chat-label {
      font-size: 9px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--text-faint);
      padding: 12px 14px 0; flex-shrink: 0;
    }
    .prov-chat-thread {
      flex: 1; overflow-y: auto; padding: 10px 14px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }
    .prov-chat-thread:empty::before {
      content: 'Ask anything about this memory and its connections…';
      color: var(--text-faint); font-size: 10px; font-style: italic; margin: auto 0;
    }
    .chat-msg {
      max-width: 90%; font-size: 10px; line-height: 1.75;
      white-space: pre-wrap; word-break: break-word;
    }
    .chat-msg-user {
      align-self: flex-end; text-align: right;
      background: var(--text); color: var(--bg);
      padding: 8px 12px; font-family: var(--mono);
    }
    .chat-msg-ai {
      align-self: flex-start;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text-muted); padding: 8px 12px; font-family: var(--mono);
    }
    .chat-msg-thinking {
      align-self: flex-start; color: var(--text-faint);
      font-size: 9px; letter-spacing: 2px; font-family: var(--mono);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
    .prov-chat-input-row {
      display: flex; gap: 0; border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .prov-ask-input {
      flex: 1; padding: 10px 12px; font-family: var(--mono);
      font-size: 10px; background: var(--bg); border: none;
      color: var(--text); outline: none;
    }
    .prov-ask-btn {
      padding: 10px 18px; font-family: var(--mono); font-size: 9px;
      letter-spacing: 2px; text-transform: uppercase;
      background: var(--text); color: var(--bg); border: none;
      cursor: pointer; transition: all 0.2s; flex-shrink: 0;
    }
    .prov-ask-btn:hover { opacity: 0.8; }
    .prov-ask-btn:disabled { opacity: 0.4; cursor: default; }
    /* kept for backward compat */
    .prov-answer { display: none; }
    .prov-chain { display: none; }
    /* ── HOW-TO GUIDE ── */
    .guide-section {
      max-width: 680px; margin: 28px auto 0; padding: 0 20px;
    }
    .guide-toggle {
      width: 100%; text-align: left; padding: 12px 0;
      font-family: var(--mono); font-size: 11px;
      color: var(--text-muted); background: none; border: none;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      letter-spacing: 1px; transition: color 0.2s;
    }
    .guide-toggle:hover { color: var(--text); }
    .guide-chevron {
      font-size: 10px; transition: transform 0.3s; display: inline-block;
    }
    .guide-toggle.open .guide-chevron { transform: rotate(90deg); }
    .guide-content {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.3s;
      opacity: 0;
    }
    .guide-content.open {
      max-height: 400px; opacity: 1;
    }
    .guide-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; padding: 8px 0 20px;
    }
    .guide-card {
      padding: 16px; border: 1px solid var(--border);
      background: var(--surface);
    }
    .guide-step {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent); color: white;
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
    }
    .guide-card-title {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .guide-card p {
      font-size: 10px; color: var(--text-muted); line-height: 1.7;
      margin-bottom: 6px;
    }
    .guide-card code {
      display: inline-block; padding: 3px 8px;
      background: rgba(0,0,0,0.04); font-size: 10px;
      color: var(--accent); letter-spacing: 0.5px;
    }
    /* ── ACTION BAR ── */
    .action-bar {
      max-width: 680px; margin: 16px auto 0; padding: 0 20px;
      display: none;
    }
    .action-bar.visible { display: block; }
    .action-inner {

  <!-- MAIN LOGIC -->
  <script>
  /* ============= STATE ============= */
  let brainNodes = [];
  let allNodes = [];
  let apiKey = null;
  let apiEndpoint = '';
  let brainReady = false;
  let pendingData = null;
  let searchMode = 'keyword';
  let localConnected = false;
  let localRefreshTimer = null;
  let searchTimer = null;
  let displayedCount = 0;
  const PAGE_SIZE = 50;
  const BRAIN_MAX = 250; // max nodes to send to 3D brain (matches brain MAX_NODES)
  let currentDisplayNodes = [];
  let isLoadingMore = false;
  /* ============= GUIDE TOGGLE ============= */
  function toggleGuide() {
    const btn = document.getElementById('guideToggle');
    const content = document.getElementById('guideContent');
    btn.classList.toggle('open');
    content.classList.toggle('open');
  }
  /* ============= TAB SWITCHING ============= */
  /* ============= API KEY AUTH ============= */
  async function connectWithApiKey() {
    const input = document.getElementById('apiKeyInput');
    const key = input.value.trim();
    if (!key) return;
    showLoading('Connecting...');
    hideError('apiKeyError');
    try {
      const res = await fetch('/api/cortex/brain?limit=500', {
        headers: { 'Authorization': 'Bearer ' + key }
      });
      if (!res.ok) {
        const msg = res.status === 401 ? 'Invalid API key' : 'Connection failed (' + res.status + ')';
        throw new Error(msg);
      }
      const data = await res.json();
      apiKey = key;
      localStorage.setItem('explorer_api_key', key);
      document.getElementById('apiKeyForm').style.display = 'none';
      document.getElementById('apiKeyConnected').style.display = 'block';
      // Enable semantic search
      document.getElementById('btnSemantic').disabled = false;
      document.getElementById('btnSemantic').title = '';
      hideLoading();
      usingSampleData = false;
      loadBrainData(data);
    } catch (err) {
      hideLoading();
      showError('apiKeyError', err.message);
    }
  }
  function disconnectApiKey() {
    apiKey = null;
    localStorage.removeItem('explorer_api_key');
    document.getElementById('apiKeyForm').style.display = 'block';
    document.getElementById('apiKeyConnected').style.display = 'none';
    document.getElementById('apiKeyInput').value = '';
    document.getElementById('btnSemantic').disabled = true;
    document.getElementById('btnSemantic').title = 'Requires API key connection';
    if (searchMode === 'semantic') setSearchMode('keyword');
    clearData();
  }

  /* ============= LOCAL SERVER CONNECTION ============= */

  // Streams /api/brain?stream=1, progressively rendering cards and the brain
  // iframe. First NDJSON chunk triggers the initial render; subsequent chunks
  // append nodes without clearing the display. A final full sort by trace-count
  // runs after the stream closes to give accurate relevance ordering.
  let _localStreamController = null;

  // isRefresh=true: skip full loadBrainData on first chunk to avoid brain flash.
  // Uses appendBrainData for every chunk so nodes are added incrementally.
  async function streamBrainAPI(minImportance = 0, isRefresh = false) {
    if (_localStreamController) _localStreamController.abort();
    _localStreamController = new AbortController();

    try {
      const qs = minImportance > 0 ? `&min_importance=${(minImportance / 100).toFixed(2)}` : '';
      const res = await fetch('/api/brain?stream=1' + qs, { signal: _localStreamController.signal });
      if (!res.ok) throw new Error('MCP server error (' + res.status + ')');

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      let firstChunk = true;
      let allReceived = [];

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop(); // keep incomplete trailing line
        for (const line of lines) {
          if (!line.trim()) continue;
          const chunk = JSON.parse(line);
          allReceived.push(...chunk.nodes);
          if (firstChunk && !isRefresh) {
            // Initial connect: full brain setup on first chunk
            firstChunk = false;
            loadBrainData({ nodes: allReceived, total: chunk.total });
          } else {
            // Refresh or subsequent chunks: incremental append (no brain rebuild flash)
            appendBrainData(chunk.nodes, chunk.total);
          }
        }
      }

      // After stream closes, re-sort by trace-count on full dataset and re-render
      if (allReceived.length > 0) {
        computeTraceCounts(allReceived);
        allReceived.sort((a, b) => (b._traceCount || 0) - (a._traceCount || 0));
        allNodes = allReceived;
        brainNodes = allNodes;
        currentDisplayNodes = filterByBrain(allNodes);
        displayedCount = 0;
        document.getElementById('cardsGrid').innerHTML = '';
        renderMoreCards();
        renderStats(brainNodes);
        applyUrlParams();
      }
    } finally {
      _localStreamController = null;
    }
  }

  // Append new nodes from a streaming chunk without clearing the existing display.
  function appendBrainData(newNodes, total) {
    const existingIds = new Set(allNodes.map(n => n.id));
    const novel = newNodes.filter(n => !existingIds.has(n.id));
    if (!novel.length) return;
    allNodes.push(...novel);
    brainNodes = allNodes;
    renderStats(brainNodes);
    // When filters are active, currentDisplayNodes is a separate filtered array
    // (filterByBrain returned a new array, not allNodes). Rebuild it so the new
    // nodes get evaluated against the current filter state.
    if (currentDisplayNodes !== allNodes) {
      currentDisplayNodes = filterByBrain(allNodes);
    }
    // Send incremental update to brain iframe (uses spawnNode, no full rebuild)
    const iframe = document.getElementById('brainFrame');
    if (iframe && iframe.contentWindow) {
      iframe.contentWindow.postMessage({ type: 'APPEND_BRAIN_DATA', payload: { nodes: novel, total } }, '*');
    }
  }

  async function connectLocal() {
    hideError('localError');
    document.getElementById('searchSection').classList.add('visible');
    document.getElementById('cardsSection').classList.add('visible');
    document.getElementById('cardsGrid').innerHTML =
      '<div style="text-align:center;padding:40px;color:var(--text-faint);font-size:10px;letter-spacing:3px">LOADING MEMORIES…</div>';
    try {
      await streamBrainAPI(brainFilters.threshold);
      localConnected = true;
      document.getElementById('btnSemantic').disabled = false;
      document.getElementById('btnSemantic').title = '';
      usingSampleData = false;
      localRefreshTimer = setInterval(refreshLocal, 30000);
    } catch (err) {
      if (err.name === 'AbortError') return;
      document.getElementById('cardsGrid').innerHTML = '';
      document.getElementById('searchSection').classList.remove('visible');
      document.getElementById('cardsSection').classList.remove('visible');
      showError('localError', err.message);
    }
  }
  function disconnectLocal() {
    localConnected = false;
    if (_localStreamController) { _localStreamController.abort(); _localStreamController = null; }
    clearInterval(localRefreshTimer);
    localRefreshTimer = null;
    document.getElementById('btnSemantic').disabled = true;
    document.getElementById('btnSemantic').title = 'Requires connection';
    if (searchMode === 'semantic') setSearchMode('keyword');
    clearData();
  }
  async function refreshLocal() {
    if (!localConnected) return;
    // isRefresh=true: skip LOAD_BRAIN_DATA on first chunk to avoid brain rebuild flash
    try { await streamBrainAPI(brainFilters.threshold, true); }
    catch (err) { if (err.name !== 'AbortError') console.warn('[clude] Refresh failed:', err?.message); }
  }

  /* ============= FILE HANDLING ============= */
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  if (dropZone) {
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    });
  }
  if (fileInput) {
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) handleFile(e.target.files[0]);
    });
  }
  function handleFile(file) {
    const sizeMB = (file.size / 1024 / 1024).toFixed(1);
    showLoading('Reading ' + file.name + ' (' + sizeMB + 'MB)...');
    const reader = new FileReader();
    reader.onload = (e) => {
      // Use setTimeout to let the loading UI paint before blocking parse
      setTimeout(() => {
        try {
          showLoading('Parsing ' + file.name + '...');
          const text = e.target.result;
          if (file.name.endsWith('.json')) {
            const pack = JSON.parse(text);
            showLoading('Loading ' + (pack.memories || pack.nodes || []).length + ' memories...');
            setTimeout(() => {
              loadFromMemoryPack(pack);
              document.getElementById('dropZone').style.display = 'none';
              document.getElementById('fileLoaded').style.display = 'flex';
              document.getElementById('fileName').textContent = file.name + ' (' + (pack.memories || pack.nodes || []).length + ' memories)';
              hideLoading();
            }, 50);
          } else {
            loadFromMarkdown(text);
            document.getElementById('dropZone').style.display = 'none';
            document.getElementById('fileLoaded').style.display = 'flex';
            document.getElementById('fileName').textContent = file.name;
            hideLoading();
          }
        } catch (err) {
          hideLoading();
          alert('Failed to parse file: ' + err.message);
        }
      }, 50);
    };
    reader.readAsText(file);
  }
  function clearFile() {
    document.getElementById('dropZone').style.display = 'block';
    document.getElementById('fileLoaded').style.display = 'none';
    fileInput.value = '';
    clearData();
  }
  /* ============= DATA PARSING ============= */
  function loadFromMemoryPack(pack) {
    usingSampleData = true;
    loadedConnections = pack.connections || [];
    const mems = pack.memories || pack.nodes || [];
    const nodes = mems.map((m, i) => ({
      id: m.id || m._local_id || (i + 1),
      type: m.type || m.memory_type || 'episodic',
      summary: m.summary || (m.content || '').slice(0, 200),
      content: m.content || m.summary || '',
      tags: m.tags || [],
      importance: m.importance ?? 0.5,
      decay: m.decay_factor ?? m.decay ?? 1,
      valence: m.emotional_valence ?? m.valence ?? 0,
      accessCount: m.access_count ?? m.accessCount ?? 0,
      source: m.source ?? m.source_wallet ?? '',
      evidenceIds: m.evidence_ids || m.evidenceIds || [],
      createdAt: m.created_at || m.createdAt || new Date().toISOString(),
      lastAccessed: m.last_accessed || m.lastAccessed || m.created_at || new Date().toISOString(),
    }));
    // Auto-build connections from evidence_ids if none provided
    if (loadedConnections.length === 0) {
      buildAutoConnections(nodes);
    }
    loadBrainData({ nodes, total: nodes.length });
  }
  function buildAutoConnections(nodes) {
    loadedConnections = [];
    const idSet = new Set(nodes.map(n => n.id));
    
    // 1. Evidence links
    for (const n of nodes) {
      if (n.evidenceIds && n.evidenceIds.length > 0) {
        for (const eid of n.evidenceIds) {
          if (idSet.has(eid)) {
            loadedConnections.push({ source_id: eid, target_id: n.id, link_type: 'supports', strength: 0.85 });
          }
        }
      }
    }
    
    // 2. Tag co-occurrence (memories sharing 2+ tags within 7 days = related)
    // Only do this for non-huge datasets to avoid O(n^2) explosion
    if (nodes.length <= 2000) {
      for (let i = 0; i < nodes.length; i++) {
        const a = nodes[i];
        if (!a.tags || a.tags.length === 0) continue;
        const aTags = new Set(a.tags);
        for (let j = i + 1; j < Math.min(i + 50, nodes.length); j++) {
          const b = nodes[j];
          if (!b.tags) continue;
          const overlap = b.tags.filter(t => aTags.has(t)).length;
          if (overlap >= 2) {
            const daysDiff = Math.abs(new Date(a.createdAt) - new Date(b.createdAt)) / 86400000;
            if (daysDiff < 7) {
              loadedConnections.push({ source_id: a.id, target_id: b.id, link_type: 'relates', strength: Math.min(0.7, overlap * 0.25) });
            }
          }
        }
      }
    }
    
    // 4. Temporal chains (same source, sequential = follows)
    const sorted = [...nodes].sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
    for (let i = 1; i < sorted.length; i++) {
      const prev = sorted[i-1], curr = sorted[i];
      if (prev.source === curr.source && prev.source !== '' && prev.source !== 'consolidation') {
        const hoursDiff = (new Date(curr.createdAt) - new Date(prev.createdAt)) / 3600000;
        if (hoursDiff < 2) {
          loadedConnections.push({ source_id: prev.id, target_id: curr.id, link_type: 'follows', strength: 0.5 });
        }
      }
    }
    
    console.log('Auto-built ' + loadedConnections.length + ' connections');
  }
  function loadFromMarkdown(text) {
    const nodes = [];
    let currentType = 'episodic';
    let id = 1;
    const typeMap = {
      'episodic': 'episodic', 'semantic': 'semantic',
      'procedural': 'procedural', 'self model': 'self_model', 'self_model': 'self_model',
    };
    for (const line of text.split('\n')) {
      const trimmed = line.trim();
      // Section headers
      const sectionMatch = trimmed.match(/^##\s+(\w[\w\s]*?)(?:\s+memories?)?(?:\s*\(\d+\))?$/i);
      if (sectionMatch) {
        const key = sectionMatch[1].toLowerCase().trim();
        if (typeMap[key]) currentType = typeMap[key];
        continue;
      }
      // Entries with importance: "- [0.85] Summary — Content"
      const entryMatch = trimmed.match(/^[-*]\s+\[(\d*\.?\d+)]\s+(.+)$/);
      if (entryMatch) {
        const importance = parseFloat(entryMatch[1]);
        const rest = entryMatch[2];
        const parts = rest.split(/\s+[—\-]{1,2}\s+/);
        nodes.push({
          id: id++, type: currentType,
          summary: parts[0].slice(0, 300),
          content: parts.length > 1 ? parts.slice(1).join(' ') : parts[0],
          tags: [], importance: Math.max(0, Math.min(1, importance)),
          decay: 1, valence: 0, accessCount: 0, source: 'import',
          evidenceIds: [], createdAt: new Date().toISOString(), lastAccessed: new Date().toISOString(),
        });
        continue;
      }
      // Cortex format: "- **[uuid]** (imp=0.8) Summary"
      const cortexMatch = trimmed.match(/^[-*]\s+\*\*\[.*?]\*\*\s*\(imp=?([\d.]+)\)\s*(.+)$/);
      if (cortexMatch) {
        nodes.push({
          id: id++, type: currentType,
          summary: cortexMatch[2].slice(0, 300), content: cortexMatch[2],
          tags: [], importance: parseFloat(cortexMatch[1]),
          decay: 1, valence: 0, accessCount: 0, source: 'import',
          evidenceIds: [], createdAt: new Date().toISOString(), lastAccessed: new Date().toISOString(),
        });
        continue;
      }
      // Plain list items
      const plainMatch = trimmed.match(/^[-*]\s+(.{10,})$/);
      if (plainMatch && !trimmed.match(/^[-*]\s+\[/)) {
        nodes.push({
          id: id++, type: currentType,
          summary: plainMatch[1].slice(0, 200), content: plainMatch[1],
          tags: [], importance: 0.5,
          decay: 1, valence: 0, accessCount: 0, source: 'import',
          evidenceIds: [], createdAt: new Date().toISOString(), lastAccessed: new Date().toISOString(),
        });
      }
    }
    if (nodes.length === 0) throw new Error('No memories found in markdown');
    loadBrainData({ nodes, total: nodes.length });
  }
  /* ============= BRAIN INTEGRATION ============= */
  function computeTraceCounts(nodes) {
    // Build adjacency using tag co-occurrence as a proxy for connections
    // (loadedConnections/evidenceIds are always empty in the current API).
    // Cap per-tag bucket at 30 nodes to avoid O(n²) blowup on common tags.
    const TAG_CAP = 30;
    const adj = new Map(); // id → Set of connected ids
    const addEdge = (a, b) => {
      if (!adj.has(a)) adj.set(a, new Set());
      if (!adj.has(b)) adj.set(b, new Set());
      adj.get(a).add(b);
      adj.get(b).add(a);
    };
    // Tag co-occurrence: nodes sharing a tag are treated as connected
    const tagToNodes = new Map();
    for (const n of nodes) {
      for (const tag of (n.tags || [])) {
        if (!tagToNodes.has(tag)) tagToNodes.set(tag, []);
        const bucket = tagToNodes.get(tag);
        if (bucket.length < TAG_CAP) bucket.push(n.id);
      }
    }
    for (const bucket of tagToNodes.values()) {
      for (let i = 0; i < bucket.length; i++) {
        for (let j = i + 1; j < bucket.length; j++) {
          addEdge(bucket[i], bucket[j]);
        }
      }
    }
    // Also include explicit evidence links if available
    for (const n of nodes) {
      if (n.evidenceIds) for (const eid of n.evidenceIds) addEdge(n.id, eid);
    }
    // BFS up to depth 3 (matching localTrace)
    const nodeSet = new Set(nodes.map(n => n.id));
    for (const n of nodes) {
      const visited = new Set([n.id]);
      let frontier = [n.id];
      for (let d = 0; d < 3 && frontier.length > 0; d++) {
        const next = [];
        for (const fid of frontier) {
          for (const nb of (adj.get(fid) || [])) {
            if (!visited.has(nb) && nodeSet.has(nb)) {
              visited.add(nb);
              next.push(nb);
            }
          }
        }
        frontier = next.slice(0, 10);
      }
      n._traceCount = visited.size - 1; // exclude self
    }

  function downloadBlob(blob, filename) {

  function simpleHash(str) {

  }

  function timeAgo(dateStr) {

    if (mins < 60) return mins + 'm';
    const hours = Math.floor(mins / 60);
    if (hours < 24) return hours + 'h';
    const days = Math.floor(hours / 24);
    if (days < 30) return days + 'd';
    return Math.floor(days / 30) + 'mo';

  /* ============= PROVENANCE ============= */

  function localTrace(memoryId) {
    const nodeMap = new Map();
    for (const n of allNodes) nodeMap.set(n.id, n);
    const root = nodeMap.get(memoryId);
    if (!root) return null;
    const toTraceNode = (n, depth, relation, strength) => ({
      id: n.id, hash_id: n.hash_id || '', summary: n.summary || '', content: n.content || '',
      memory_type: n.type || 'episodic', source: n.source || '', importance: n.importance || 0,
      emotional_valence: n.valence || 0, decay_factor: n.decay ?? 1, access_count: n.accessCount || 0,
      created_at: n.createdAt || '', last_accessed: n.lastAccessed || '',
      tags: n.tags || [], concepts: [], depth, relation, strength,
    });
    const ancestors = [];
    const descendants = [];
    const related = [];
    const links = [];
    const visited = new Set([memoryId]);
    const MAX_DEPTH = 3;
    // Build adjacency index for fast lookup
    const inbound = new Map();  // target_id → [{source_id, link_type, strength}]
    const outbound = new Map(); // source_id → [{target_id, link_type, strength}]
    for (const conn of loadedConnections) {
      if (!inbound.has(conn.target_id)) inbound.set(conn.target_id, []);
      inbound.get(conn.target_id).push(conn);
      if (!outbound.has(conn.source_id)) outbound.set(conn.source_id, []);
      outbound.get(conn.source_id).push(conn);
    }
    // Also index evidence_ids as inbound
    for (const n of allNodes) {
      if (n.evidenceIds) {
        for (const eid of n.evidenceIds) {
          const conn = { source_id: eid, target_id: n.id, link_type: 'supports', strength: 0.85 };
          if (!inbound.has(n.id)) inbound.set(n.id, []);
          inbound.get(n.id).push(conn);
          if (!outbound.has(eid)) outbound.set(eid, []);
          outbound.get(eid).push(conn);
        }
      }
    }
    // Walk ancestors (multi-hop backward)
    let frontier = [memoryId];
    for (let depth = 1; depth <= MAX_DEPTH && frontier.length > 0; depth++) {
      const nextFrontier = [];
      for (const fid of frontier) {
        const ins = inbound.get(fid) || [];
        for (const conn of ins) {
          if (visited.has(conn.source_id)) continue;
          const src = nodeMap.get(conn.source_id);
          if (!src) continue;
          visited.add(conn.source_id);
          ancestors.push(toTraceNode(src, depth, conn.link_type, conn.strength));
          links.push(conn);
          nextFrontier.push(conn.source_id);
        }
      }
      frontier = nextFrontier.slice(0, 10); // cap per-hop
    }
    // Walk descendants (multi-hop forward)
    frontier = [memoryId];
    for (let depth = 1; depth <= MAX_DEPTH && frontier.length > 0; depth++) {
      const nextFrontier = [];
      for (const fid of frontier) {
        const outs = outbound.get(fid) || [];
        for (const conn of outs) {
          if (visited.has(conn.target_id)) continue;
          const tgt = nodeMap.get(conn.target_id);
          if (!tgt) continue;
          visited.add(conn.target_id);
          descendants.push(toTraceNode(tgt, depth, conn.link_type, conn.strength));
          links.push(conn);
          nextFrontier.push(conn.target_id);
        }
      }
      frontier = nextFrontier.slice(0, 10);
    }
    // Find tag-related memories (best matches not yet visited)
    const rootTags = new Set(root.tags || []);
    if (rootTags.size > 0) {
      const scored = allNodes.filter(n => !visited.has(n.id))
        .map(n => ({ node: n, overlap: (n.tags || []).filter(t => rootTags.has(t)).length }))
        .filter(x => x.overlap > 0)
        .sort((a, b) => b.overlap - a.overlap || (b.node.importance||0) - (a.node.importance||0))
        .slice(0, 10);
      for (const { node, overlap } of scored) {
        visited.add(node.id);
        const sharedTag = (node.tags || []).find(t => rootTags.has(t)) || 'tag';
        related.push(toTraceNode(node, 1, 'shared:' + sharedTag, Math.min(0.8, overlap * 0.3)));
      }
    }
    // If still very few results, find temporally close memories (same day, same source)
    if (ancestors.length + descendants.length + related.length < 5) {
      const rootDate = new Date(root.createdAt).getTime();
      const nearby = allNodes.filter(n => !visited.has(n.id))
        .map(n => ({ node: n, diff: Math.abs(new Date(n.createdAt).getTime() - rootDate) }))
        .filter(x => x.diff < 86400000) // within 24 hours
        .sort((a, b) => a.diff - b.diff)
        .slice(0, 8);
      for (const { node } of nearby) {
        visited.add(node.id);
        related.push(toTraceNode(node, 1, 'temporal', 0.4));
      }
    }
    const allN = [toTraceNode(root, 0, 'root', 1.0), ...ancestors, ...descendants, ...related];
    const timeline = [...allN].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
    const linkTypes = {};
    for (const l of links) linkTypes[l.link_type] = (linkTypes[l.link_type] || 0) + 1;
    if (related.length) linkTypes['related'] = related.length;
    const dates = allN.map(n => new Date(n.created_at).getTime()).filter(t => !isNaN(t));
    const span = dates.length > 1 ? (Math.max(...dates) - Math.min(...dates)) / 86400000 : 0;
    const maxD = Math.max(0, ...allN.map(n => n.depth));
    return {
      root: toTraceNode(root, 0, 'root', 1.0),
      ancestors, descendants, related, links, entities: [], timeline,
      stats: { total_nodes: allN.length, max_depth: maxD, link_types: linkTypes, time_span_days: Math.round(span * 10) / 10 }
    };
  }
  function closeProvenance() {
    document.getElementById('provOverlay').classList.remove('visible');
    currentProvTrace = null;
  }
  function renderProvenance(trace) {
    // Stats
    const linkSummary = Object.entries(trace.stats.link_types || {}).map(([k,v]) => k + ':' + v).join('  ');
    document.getElementById('provStats').innerHTML =
      '<span><span class="v">' + trace.stats.total_nodes + '</span> nodes</span>' +
      '<span><span class="v">' + trace.ancestors.length + '</span> ancestors</span>' +
      '<span><span class="v">' + trace.descendants.length + '</span> descendants</span>' +
      '<span><span class="v">' + trace.related.length + '</span> related</span>' +
      '<span>depth <span class="v">' + trace.stats.max_depth + '</span></span>' +
      '<span>span <span class="v">' + trace.stats.time_span_days + 'd</span></span>' +
      (trace.entities.length ? '<span>entities: <span class="v">' + trace.entities.map(e => e.name).join(', ') + '</span></span>' : '');
    // Sidebar
    let html = '';
    html += provNodeCard(trace.root, 'root');
    if (trace.ancestors.length > 0) {
      html += '<div class="prov-section-label" style="margin-top:12px">Ancestors (' + trace.ancestors.length + ')</div>';
      trace.ancestors.forEach(a => html += provNodeCard(a, 'ancestor'));
    }
    if (trace.descendants.length > 0) {
      html += '<div class="prov-section-label" style="margin-top:12px">Descendants (' + trace.descendants.length + ')</div>';
      trace.descendants.forEach(d => html += provNodeCard(d, 'descendant'));
    }
    if (trace.related.length > 0) {
      html += '<div class="prov-section-label" style="margin-top:12px">Related (' + trace.related.length + ')</div>';
      trace.related.forEach(r => html += provNodeCard(r, 'related'));
    }
    document.getElementById('provSidebar').innerHTML = html;
    // Graph
    renderProvGraph(trace);
  }
  function provNodeCard(node, category) {
    const date = new Date(node.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    return '<div class="prov-node-card prov-' + category + '" onclick="openProvenance(' + node.id + ')">' +
      '<div class="prov-node-head">' +
        '<span class="prov-node-type">' + category + ' · ' + esc(node.memory_type) + '</span>' +
        '<span class="prov-node-date">' + date + '</span>' +
      '</div>' +
      (node.relation !== 'root' ? '<div class="prov-node-relation">↳ ' + esc(node.relation) + ' (' + node.strength.toFixed(2) + ')</div>' : '') +
      '<div class="prov-node-summary">' + esc(node.summary || node.content || '') + '</div>' +
      '<div class="prov-node-meta">' +
        '<span>imp <span class="v">' + (node.importance || 0).toFixed(2) + '</span></span>' +
        '<span title="Vitality">vitality <span class="v">' + ((node.decay_factor || 1) * 100).toFixed(0) + '%</span></span>' +
        '<span>accessed <span class="v">' + (node.access_count || 0) + 'x</span></span>' +
      '</div>' +
    '</div>';
  }
  function renderProvGraph(trace) {
    const canvas = document.getElementById('provCanvas');
    const panel = document.getElementById('provGraphPanel');
    const rect = panel.getBoundingClientRect();
    const W = rect.width || 700;
    const H = 420;
    canvas.width = W * 2; canvas.height = H * 2;
    canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2);
    const allN = [trace.root, ...trace.ancestors, ...trace.descendants, ...trace.related];
    const nodeMap = new Map();
    const colors = { root: '#2244ff', ancestor: '#3498db', descendant: '#2a6a3a', related: '#9b59b6' };
    const nodes = allN.map(n => {
      const cat = n.depth === 0 ? 'root' :
        trace.ancestors.includes(n) ? 'ancestor' :
        trace.descendants.includes(n) ? 'descendant' : 'related';
      const obj = {
        id: n.id, x: W/2 + (Math.random()-0.5)*W*0.5, y: H/2 + (Math.random()-0.5)*H*0.5,
        vx: 0, vy: 0, r: n.depth === 0 ? 13 : Math.max(5, 9 - n.depth*2),
        color: colors[cat], label: (n.summary||'').slice(0, 25), importance: n.importance, cat, data: n,
      };
      nodeMap.set(n.id, obj);
      return obj;
    });
    const edges = (trace.links||[]).map(l => ({
      source: nodeMap.get(l.source_id), target: nodeMap.get(l.target_id),
      strength: l.strength, type: l.link_type,
    })).filter(e => e.source && e.target);
    // Ensure connectivity
    for (const n of [...trace.ancestors, ...trace.descendants]) {
      if (!edges.some(e => (e.source.id===n.id && e.target.id===trace.root.id) || (e.target.id===n.id && e.source.id===trace.root.id))) {
        if (nodeMap.has(n.id)) edges.push({ source: nodeMap.get(n.id), target: nodeMap.get(trace.root.id), strength: n.strength, type: n.relation });
      }
    }
    function tick() {
      for (let i=0;i<nodes.length;i++) for (let j=i+1;j<nodes.length;j++) {
        let dx=nodes[j].x-nodes[i].x, dy=nodes[j].y-nodes[i].y, d=Math.sqrt(dx*dx+dy*dy)||1, f=600/(d*d);
        nodes[i].vx-=dx/d*f; nodes[i].vy-=dy/d*f; nodes[j].vx+=dx/d*f; nodes[j].vy+=dy/d*f;
      }
      for (const e of edges) {
        let dx=e.target.x-e.source.x, dy=e.target.y-e.source.y, d=Math.sqrt(dx*dx+dy*dy)||1, f=(d-90)*0.01*e.strength;
        e.source.vx+=dx/d*f; e.source.vy+=dy/d*f; e.target.vx-=dx/d*f; e.target.vy-=dy/d*f;
      }
      for (const n of nodes) {
        n.vx+=(W/2-n.x)*0.002; n.vy+=(H/2-n.y)*0.002; n.vx*=0.85; n.vy*=0.85;
        n.x+=n.vx; n.y+=n.vy;
        n.x=Math.max(n.r+5,Math.min(W-n.r-5,n.x)); n.y=Math.max(n.r+5,Math.min(H-n.r-5,n.y));
      }
    }
    function draw() {
      ctx.clearRect(0,0,W,H);
      for (const e of edges) {
        ctx.beginPath(); ctx.moveTo(e.source.x,e.source.y); ctx.lineTo(e.target.x,e.target.y);
        ctx.strokeStyle='rgba(0,0,0,'+(0.06+e.strength*0.1)+')'; ctx.lineWidth=0.5+e.strength; ctx.stroke();
      }
      for (const n of nodes) {
        ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
        ctx.fillStyle=n.color; ctx.globalAlpha=0.25+n.importance*0.75; ctx.fill();
        ctx.globalAlpha=1; ctx.strokeStyle=n.color; ctx.lineWidth=n.cat==='root'?2:1; ctx.stroke();
        if (n.r>=7) { ctx.font=(n.cat==='root'?9:7)+'px JetBrains Mono'; ctx.fillStyle='#333'; ctx.textAlign='center'; ctx.fillText(n.label,n.x,n.y+n.r+10); }
      }
    }
    let frame=0;
    (function animate(){ tick(); draw(); if(++frame<180) requestAnimationFrame(animate); })();
    canvas.onclick = function(e) {
      const r = canvas.getBoundingClientRect();
      const x = e.clientX-r.left, y = e.clientY-r.top;
      for (const n of nodes) {
        if ((n.x-x)**2+(n.y-y)**2 < (n.r+5)**2) { openProvenance(n.id); break; }
      }
    };
  }
  function localExplain(trace, question) {
    const root = trace.root;
    const ancestors = trace.ancestors || [];
    const descendants = trace.descendants || [];
    const q = question.toLowerCase();
    // Build explanation from trace context
    let explanation = '';
    const rootType = root.memory_type || 'memory';
    // Summarize the root
    explanation += 'This ' + rootType + ' memory captures: "' + (root.content || root.summary || '') + '"\n\n';
    // Describe ancestry
    if (ancestors.length > 0) {
      const byRelation = {};
      ancestors.forEach(a => {
        const r = a.relation || 'related';
        if (!byRelation[r]) byRelation[r] = [];
        byRelation[r].push(a);
      });
      explanation += 'It is connected to ' + ancestors.length + ' ancestor memories:\n\n';
      for (const [relation, mems] of Object.entries(byRelation)) {
        explanation += '• ' + relation + ' (' + mems.length + '): ';
        explanation += mems.slice(0, 5).map(m => '"' + (m.summary || m.content || '').slice(0, 80) + '"').join(', ');
        if (mems.length > 5) explanation += ' and ' + (mems.length - 5) + ' more';
        explanation += '\n';
      }
    }
    if (descendants.length > 0) {
      explanation += '\nThis memory led to ' + descendants.length + ' downstream memories, including: ';
      explanation += descendants.slice(0, 5).map(d => '"' + (d.summary || d.content || '').slice(0, 80) + '"').join(', ');
      explanation += '\n';
    }
    // Build reasoning chain from trace timeline
    const allNodes = [root, ...ancestors, ...descendants].filter(n => n.created_at);
    allNodes.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
    const chain = allNodes.slice(0, 8).map(n => {
      const date = new Date(n.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const rel = n.relation && n.relation !== 'root' ? ' [' + n.relation + ']' : '';
      return date + ': ' + (n.summary || (n.content || '').slice(0, 100)) + rel;
    });
    return { explanation, reasoning_chain: chain };
  }
  // Per-memory conversation state — reset when a new memory is opened
  let provAsking = false;
  let chatHistory = []; // [{role:'user'|'assistant', content:string}]

  function chatAppend(role, text) {
    const thread = document.getElementById('provChatThread');
    const div = document.createElement('div');
    div.className = role === 'user' ? 'chat-msg chat-msg-user' : 'chat-msg chat-msg-ai';
    div.textContent = text;
    thread.appendChild(div);
    thread.scrollTop = thread.scrollHeight;
    return div;
  }

  function chatThinking() {
    const thread = document.getElementById('provChatThread');
    const div = document.createElement('div');
    div.className = 'chat-msg chat-msg-thinking';
    div.id = 'chatThinking';
    div.textContent = 'THINKING...';
    thread.appendChild(div);
    thread.scrollTop = thread.scrollHeight;
    return div;
  }

  async function askProvenance() {
    if (!currentProvTrace || provAsking) return;
    const input = document.getElementById('provAskInput');
    const btn = document.getElementById('provAskBtn');
    const q = input.value.trim();
    if (!q) return;

    provAsking = true;
    input.value = '';
    btn.disabled = true;
    btn.textContent = '…';

    chatAppend('user', q);
    const thinking = chatThinking();

    try {
      let explanation;
      if (usingSampleData) {
        const result = localExplain(currentProvTrace, q);
        explanation = result.explanation;
      } else {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 45000);
        const res = await fetch('/api/memory/' + currentProvTrace.root.id + '/explain', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            question: q,
            memory: currentProvTrace.root,
            ancestors: (currentProvTrace.ancestors || []).slice(0, 8),
            descendants: (currentProvTrace.descendants || []).slice(0, 8),
            related: (currentProvTrace.related || []).slice(0, 6),
            history: chatHistory,
          }),
          signal: controller.signal,
        });
        clearTimeout(timeout);
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Server error ' + res.status);
        }
        const data = await res.json();
        explanation = data.explanation;
      }

      // Save to history for next turn
      chatHistory.push({ role: 'user', content: q });
      chatHistory.push({ role: 'assistant', content: explanation });

      thinking.remove();
      chatAppend('assistant', explanation);
    } catch (err) {
      thinking.remove();
      const msg = err.name === 'AbortError' ? 'Request timed out — try again.' : err.message;
      const errDiv = chatAppend('assistant', '⚠ ' + msg);
      errDiv.style.color = 'var(--error)';
    } finally {
      provAsking = false;
      btn.disabled = false;
      btn.textContent = 'Ask';
      input.focus();
    }
  }

  // Enter key submits
  document.getElementById('provAskInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) askProvenance();
  });
  // Escape to close
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && currentProvTrace) closeProvenance();
  });
  /* ============= PRIVY WALLET EVENT ============= */
  window.addEventListener('privy-wallet', async (e) => {
    const { address, token } = e.detail;
    showLoading('Fetching memories for ' + address.slice(0, 4) + '...' + address.slice(-4) + '...');
    try {
      const res = await fetch('/api/user/brain?wallet=' + encodeURIComponent(address) + '&limit=500', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!res.ok) throw new Error('Failed to fetch: ' + res.status);
      const data = await res.json();
      if (!data.nodes || data.nodes.length === 0) {
        hideLoading();
        alert('No memories found for this wallet.');
        return;
      }
      hideLoading();
      loadBrainData(data);
    } catch (err) {
      hideLoading();
      alert('Failed to retrieve memories: ' + err.message);
    }
  });
  </script>
